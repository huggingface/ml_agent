name: Sweep Orphan Sandbox Spaces

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Delete stale sandbox Spaces
        env:
          HF_ADMIN_TOKEN: ${{ secrets.HF_ADMIN_TOKEN }}
        run: uv run python scripts/sweep_orphan_sandboxes.py --apply --max-age-days 7
